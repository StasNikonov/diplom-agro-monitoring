<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a4d2e"/>
  <!-- Wheat stalk -->
  <line x1="32" y1="54" x2="32" y2="18" stroke="#a8d5a2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wheat grains -->
  <ellipse cx="32" cy="18" rx="4.5" ry="6" fill="#f5d86e" transform="rotate(-15 32 18)"/>
  <ellipse cx="27" cy="22" rx="4" ry="5.5" fill="#f5d86e" transform="rotate(-35 27 22)"/>
  <ellipse cx="37" cy="22" rx="4" ry="5.5" fill="#f5d86e" transform="rotate(35 37 22)"/>
  <ellipse cx="24" cy="27" rx="3.5" ry="5" fill="#f5d86e" transform="rotate(-40 24 27)"/>
  <ellipse cx="40" cy="27" rx="3.5" ry="5" fill="#f5d86e" transform="rotate(40 40 27)"/>
  <!-- Drone arms -->
  <line x1="32" y1="44" x2="18" y2="36" stroke="#7ec8a0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="46" y2="36" stroke="#7ec8a0" stroke-width="2" stroke-linecap="round"/>
  <!-- Drone rotors -->
  <circle cx="16" cy="35" r="4" fill="none" stroke="#7ec8a0" stroke-width="1.5"/>
  <circle cx="48" cy="35" r="4" fill="none" stroke="#7ec8a0" stroke-width="1.5"/>
  <!-- Ground line -->
  <line x1="16" y1="54" x2="48" y2="54" stroke="#a8d5a2" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,3"/>
</svg>
